<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Personal Portfolio">
    <meta property="og:title" content="Personal Portfolio">
    <meta property="og:description" content="Software Engineer Portfolio">
    <meta property="og:type" content="website">
    <title>Personal Portfolio</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav id="navbar">
        <div class="nav-container">
            <div class="nav-brand" id="nav-brand"></div>
            <ul class="nav-links" id="nav-links"></ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <!-- Hero Section -->
        <section id="hero" class="section">
            <div class="container" id="hero-content">
                <div class="loading">Loading profile...</div>
            </div>
        </section>

        <!-- Skills Section -->
        <section id="skills" class="section">
            <div class="container">
                <h2 class="section-title">Skills</h2>
                <div id="skills-content">
                    <div class="loading">Loading skills...</div>
                </div>
            </div>
        </section>

        <!-- Experience Section -->
        <section id="experience" class="section">
            <div class="container">
                <h2 class="section-title">Experience</h2>
                <div id="experience-content">
                    <div class="loading">Loading experience...</div>
                </div>
            </div>
        </section>

        <!-- Projects Section -->
        <section id="projects" class="section">
            <div class="container">
                <h2 class="section-title">Projects</h2>
                <div id="projects-content">
                    <div class="loading">Loading projects...</div>
                </div>
            </div>
        </section>

        <!-- Blogs Section -->
        <section id="blogs" class="section">
            <div class="container">
                <h2 class="section-title">Blog</h2>
                <div id="blogs-content">
                    <div class="loading">Loading blogs...</div>
                </div>
            </div>
        </section>

        <!-- Links Section -->
        <section id="links" class="section">
            <div class="container">
                <h2 class="section-title">Connect</h2>
                <div id="links-content">
                    <div class="loading">Loading links...</div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer id="footer"></footer>

    <script src="./js/loader.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
